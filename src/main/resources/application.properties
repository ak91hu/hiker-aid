spring.application.name=HikerAid
server.port=${PORT:8080}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

spring.thymeleaf.cache=true

# Compress static assets
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=1024

# H2 Database (file-based, persists between restarts on local; ephemeral on Render free tier)
spring.datasource.url=jdbc:h2:file:./data/hikeraid
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# Google OAuth2 — set via environment variables
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# Admin — set ADMIN_EMAIL env var to a Google email address to grant admin access
hikerAid.admin-email=${ADMIN_EMAIL:}

# Gemini AI — set GEMINI_API_KEY env var for AI performance analysis
hikerAid.gemini-api-key=${GEMINI_API_KEY:}

# Resend.com — transactional email via HTTP API (friend invites + emergency alerts)
hikerAid.resend-api-key=${RESEND_API_KEY:re_Lz6LhmXs_3rMfsvvD4L1d6FEFr5PewQve}
hikerAid.resend-from=${RESEND_FROM:HikerAid <noreply@myappmail.online>}

# Disable HTTP browser cache for static assets
spring.web.resources.cache.cachecontrol.no-store=true

